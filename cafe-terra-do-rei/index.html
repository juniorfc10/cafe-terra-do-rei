<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Café Terra do Rei</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      background:#0f172a;
      overflow:hidden;
      color:white;
    }

    .topbar{
      width:100%;
      height:70px;
      background:#111827;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 30px;
      border-bottom:1px solid #1f2937;
    }

    .logo{
      display:flex;
      align-items:center;
      gap:12px;
      font-size:22px;
      font-weight:bold;
    }

    .logo-icon{
      width:14px;
      height:14px;
      border-radius:50%;
      background:#22c55e;
      box-shadow:0 0 10px #22c55e;
    }

    .status{
      display:flex;
      align-items:center;
      gap:10px;
      font-size:14px;
      color:#9ca3af;
    }

    .status-dot{
      width:10px;
      height:10px;
      border-radius:50%;
      background:#22c55e;
    }

    .container{
      width:100%;
      height:calc(100vh - 70px);
      position:relative;
    }

    iframe{
      width:100%;
      height:100%;
      border:none;
      background:white;
    }

    .fullscreen-btn{
      position:absolute;
      top:20px;
      right:20px;
      z-index:999;
      background:#2563eb;
      color:white;
      border:none;
      padding:12px 18px;
      border-radius:10px;
      cursor:pointer;
      font-size:14px;
      transition:0.3s;
    }

    .fullscreen-btn:hover{
      background:#1d4ed8;
    }

  </style>
</head>

<body>

  <div class="topbar">

    <div class="logo">
      <div class="logo-icon"></div>
      <span>Café Terra do Rei</span>
    </div>

    <div class="status">
      <div class="status-dot"></div>
      Power BI Online
    </div>

  </div>

  <div class="container">

    <button class="fullscreen-btn" onclick="ativarTelaCheia()">
      Tela Cheia
    </button>

    <iframe
      title="FATURAMENTO"
      src="https://app.powerbi.com/view?r=eyJrIjoiNTI4Y2YxY2MtYjdhZS00NzE0LTg3OTEtYzVjNmJiMGY3NWRlIiwidCI6IjIyMDRmZTJhLTA0YzUtNGVmOS05ODk1LWQyYzg2OWE2NzA3NyJ9"
      allowfullscreen="true">
    </iframe>

  </div>

  <script>

    function ativarTelaCheia(){

      if(document.documentElement.requestFullscreen){
        document.documentElement.requestFullscreen();
      }

    }

    // Atualiza automaticamente a página a cada 15 minutos
    setInterval(() => {
      location.reload();
    }, 900000);

  </script>

</body>

</html>
